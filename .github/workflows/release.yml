name: Build Release Artifacts

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test

  # Linux + Windows need no code-signing.
  build:
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            args: --linux AppImage
          - os: windows-latest
            args: --win nsis
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Write bundled Supabase config
        shell: bash
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env
      - name: Build app
        run: npm run build
      - name: Build and publish distributables
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder ${{ matrix.args }} --publish always

  # macOS is signed + notarized with the Developer ID Application cert. The
  # signing secrets were loaded into the repo from 1Password via `gh secret set`
  # (CSC_LINK = base64 of the .p12; see docs/RELEASING.md). electron-builder
  # reads them from the environment.
  build-mac:
    needs: [test]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Write bundled Supabase config
        shell: bash
        run: |
          echo "VITE_SUPABASE_URL=${{ secrets.VITE_SUPABASE_URL }}" >> .env
          echo "VITE_SUPABASE_ANON_KEY=${{ secrets.VITE_SUPABASE_ANON_KEY }}" >> .env
      - name: Build app
        run: npm run build
      - name: Build, sign & publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder --mac --publish always

  publish:
    needs: [build, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set release notes from RELEASE_NOTES.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          notes=$(awk -v ver="$tag" '
            /^Version v[0-9]/ { capture = ($2 == ver) ? 1 : 0; next }
            capture { print }
          ' RELEASE_NOTES.md)
          if [ -z "$(printf '%s' "$notes" | tr -d '[:space:]')" ]; then
            echo "::error::No RELEASE_NOTES.md section found for $tag. Add a 'Version $tag — <date>' entry and re-run." >&2
            exit 1
          fi
          gh release edit "$tag" --notes "$notes"

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${GITHUB_REF#refs/tags/}" --draft=false

      - name: Post to Discord
        if: ${{ vars.DISCORD_WEBHOOK_URL != '' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ vars.DISCORD_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          export TAG="$tag"
          export RELEASE_URL="https://github.com/darkharasho/axiroster/releases/tag/${tag}"
          export NOTES="$(gh release view "$tag" --json body --jq '.body' 2>/dev/null || echo '')"
          payload=$(python3 -c "
          import json, os
          tag = os.environ['TAG']
          notes = os.environ.get('NOTES', '')
          if len(notes) > 3800:
              notes = notes[:3800] + '\n\n*... see full notes on GitHub*'
          print(json.dumps({'embeds': [{
              'title': f'AxiRoster {tag}',
              'url': os.environ['RELEASE_URL'],
              'description': notes or 'A new version of AxiRoster is available!',
              'color': 0x10B981,
              'thumbnail': {'url': 'https://raw.githubusercontent.com/darkharasho/axiroster/main/build/icon.png'},
              'footer': {'text': 'AxiRoster Release'},
          }]}))
          ")
          curl -s -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK_URL"
