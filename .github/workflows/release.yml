name: Build Release Artifacts

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test

  # Linux + Windows need no code-signing.
  build:
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            args: --linux AppImage
          - os: windows-latest
            args: --win nsis
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build app
        run: npm run build
      - name: Build and publish distributables
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder ${{ matrix.args }} --publish always

  # macOS is signed + notarized. Credentials live in 1Password and are injected
  # by the 1Password CLI (`op run`), which resolves the op:// env references for
  # the wrapped command only and masks them. Requires the OP_SERVICE_ACCOUNT_TOKEN
  # repo secret + a matching 1Password item (see docs/RELEASING.md). CSC_LINK is
  # the base64 of the Developer ID Application .p12.
  build-mac:
    needs: [test]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Build app
        run: npm run build
      - name: Install 1Password CLI
        uses: 1password/install-cli-action@v1
      - name: Build, sign & publish (op injects signing creds)
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: op://AxiRoster/macOS Signing/certificate_base64
          CSC_KEY_PASSWORD: op://AxiRoster/macOS Signing/certificate_password
          APPLE_ID: op://AxiRoster/macOS Signing/apple_id
          APPLE_APP_SPECIFIC_PASSWORD: op://AxiRoster/macOS Signing/app_specific_password
          APPLE_TEAM_ID: op://AxiRoster/macOS Signing/team_id
        run: op run -- npx electron-builder --mac --publish always

  publish:
    needs: [build, build-mac]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set release notes from RELEASE_NOTES.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          notes=$(awk -v ver="$tag" '
            /^Version v[0-9]/ { capture = ($2 == ver) ? 1 : 0; next }
            capture { print }
          ' RELEASE_NOTES.md)
          if [ -z "$(printf '%s' "$notes" | tr -d '[:space:]')" ]; then
            echo "::error::No RELEASE_NOTES.md section found for $tag. Add a 'Version $tag — <date>' entry and re-run." >&2
            exit 1
          fi
          gh release edit "$tag" --notes "$notes"

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${GITHUB_REF#refs/tags/}" --draft=false

      - name: Post to Discord
        if: ${{ vars.DISCORD_WEBHOOK_URL != '' }}
        env:
          DISCORD_WEBHOOK_URL: ${{ vars.DISCORD_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          export TAG="$tag"
          export RELEASE_URL="https://github.com/darkharasho/axiroster/releases/tag/${tag}"
          export NOTES="$(gh release view "$tag" --json body --jq '.body' 2>/dev/null || echo '')"
          payload=$(python3 -c "
          import json, os
          tag = os.environ['TAG']
          notes = os.environ.get('NOTES', '')
          if len(notes) > 3800:
              notes = notes[:3800] + '\n\n*... see full notes on GitHub*'
          print(json.dumps({'embeds': [{
              'title': f'AxiRoster {tag}',
              'url': os.environ['RELEASE_URL'],
              'description': notes or 'A new version of AxiRoster is available!',
              'color': 0x10B981,
              'thumbnail': {'url': 'https://raw.githubusercontent.com/darkharasho/axiroster/main/build/icon.png'},
              'footer': {'text': 'AxiRoster Release'},
          }]}))
          ")
          curl -s -H "Content-Type: application/json" -d "$payload" "$DISCORD_WEBHOOK_URL"
